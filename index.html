<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Bíblico - Transparente y Dinámico</title>
    <!-- Importar fuentes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Variables CSS para los colores dinámicos */
        :root {
            --card-bg: rgba(26, 60, 90, 0.85); /* Fondo del cuadro (semitransparente para efecto cristal) */
            --text-color: #ffffff; /* Color de las letras del versículo */
            --accent-color: #87CEEB; /* Color de referencias, barra de tiempo y decoraciones */
        }

        /* FONDO TOTALMENTE TRANSPARENTE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent; /* Fondo general invisible */
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Nubes y Flores con color dinámico */
        .clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2; /* Muy sutil para no estorbar el video de atrás */
            transition: opacity 1.5s;
        }
        .cloud {
            position: absolute;
            /* La nube toma el color de fondo dinámico */
            background: radial-gradient(circle, var(--card-bg) 0%, transparent 70%);
            border-radius: 50%;
            transition: background 1.5s ease;
        }
        .cloud-1 { width: 600px; height: 400px; top: -100px; left: -100px; }
        .cloud-2 { width: 500px; height: 350px; bottom: -50px; right: -50px; }
        .cloud-3 { width: 400px; height: 300px; top: 20%; right: 10%; opacity: 0.4; }

        .flowers {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .flower-svg {
            position: absolute;
            fill: var(--accent-color); /* Toma el color de acento dinámico */
            opacity: 0.4;
            width: 150px;
            height: auto;
            transition: fill 1.5s ease;
        }
        .flower-tl { top: -20px; left: -20px; transform: rotate(45deg); }
        .flower-br { bottom: -20px; right: -20px; transform: rotate(225deg); }

        /* Contenedor principal del texto */
        .verse-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 950px;
            padding: 50px 60px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--accent-color);
            transition: opacity 1.5s ease-in-out, background 1.5s ease-in-out, border-color 1.5s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0;
        }

        /* Estilos tipográficos */
        .verse-text {
            font-size: 2.8rem;
            line-height: 1.4;
            margin-bottom: 30px;
            font-weight: 500;
            color: var(--text-color);
            transition: color 1.5s ease-in-out;
        }
        
        .verse-text::before { content: "«"; color: var(--accent-color); margin-right: 8px; transition: color 1.5s; }
        .verse-text::after { content: "»"; color: var(--accent-color); margin-left: 8px; transition: color 1.5s; }

        .verse-ref {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 1.5s ease-in-out;
        }

        /* Barra de progreso */
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.15);
            z-index: 20;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 1s linear, background 1.5s ease-in-out;
        }

        /* Responsividad para móviles */
        @media (max-width: 768px) {
            .verse-text { font-size: 1.8rem; }
            .verse-container { padding: 30px; margin: 20px; }
            .verse-ref { font-size: 1.1rem; }
            .flower-svg { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <div class="flowers">
        <svg class="flower-svg flower-tl" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 0 C60 30 70 40 100 50 C70 60 60 70 50 100 C40 70 30 60 0 50 C30 40 40 30 50 0 Z"/>
            <circle cx="50" cy="50" r="10" />
        </svg>
        <svg class="flower-svg flower-br" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 0 C60 30 70 40 100 50 C70 60 60 70 50 100 C40 70 30 60 0 50 C30 40 40 30 50 0 Z"/>
            <circle cx="50" cy="50" r="10" />
        </svg>
    </div>

    <div class="verse-container" id="verse-container">
        <div class="verse-text" id="verse-text">Cargando la Palabra...</div>
        <div class="verse-ref" id="verse-ref">-</div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

            { bg: "rgba(20, 80, 90, 0.88)", text: "#ffffff", accent: "#A3E4D7" },   // Verde Azulado / Cyan
            { bg: "rgba(10, 10, 10, 0.85)", text: "#FDFEFE", accent: "#F1C40F" },   // Negro Cristalino / Dorado
            { bg: "rgba(120, 65, 20, 0.88)", text: "#ffffff", accent: "#F9E79F" },  // Bronce / Amarillo Claro
            { bg: "rgba(240, 240, 240, 0.88)", text: "#2C3E50", accent: "#E74C3C" },// Gris Claro / Rojo Coral

            // --- AMOR (25 Versículos) ---

            { ref: "1 Juan 4:16", text: "Y nosotros hemos conocido y creído el amor que Dios tiene para con nosotros. Dios es amor; y el que permanece en amor, permanece en Dios, y Dios en él." },
            { ref: "1 Juan 4:19", text: "Nosotros le amamos a él, porque él nos amó primero." },
            { ref: "Jeremías 31:3", text: "Jehová se manifestó a mí hace ya mucho tiempo, diciendo: Con amor eterno te he amado; por tanto, te prolongué mi misericordia." },

            { ref: "Juan 13:34", text: "Un mandamiento nuevo os doy: Que os améis unos a otros; como yo os he amado, que también os améis unos a otros." },

            { ref: "Romanos 8:38-39", text: "Por lo cual estoy seguro de que ni la muerte, ni la vida... nos podrá separar del amor de Dios, que es en Cristo Jesús Señor nuestro." },
            { ref: "Efesios 2:4-5", text: "Pero Dios, que es rico en misericordia, por su gran amor con que nos amó, aun estando nosotros muertos en pecados, nos dio vida juntamente con Cristo." },

            { ref: "Gálatas 2:20", text: "Con Cristo estoy juntamente crucificado, y ya no vivo yo, mas vive Cristo en mí; y lo que ahora vivo en la carne, lo vivo en la fe del Hijo de Dios, el cual me amó y se entregó a sí mismo por mí." },

            { ref: "1 Juan 4:10", text: "En esto consiste el amor: no en que nosotros hayamos amado a Dios, sino en que él nos amó a nosotros, y envió a su Hijo en propiciación por nuestros pecados." },
            { ref: "1 Juan 4:11", text: "Amados, si Dios nos ha amado así, debemos también nosotros amarnos unos a otros." },

            { ref: "Proverbios 10:12", text: "El odio despierta rencillas; pero el amor cubrirá todas las faltas." },

            { ref: "Efesios 5:19-20", text: "Hablando entre vosotros con salmos, con himnos y cánticos espirituales, cantando y alabando al Señor en vuestros corazones." },
            { ref: "Hechos 16:25", text: "Pero a medianoche, orando Pablo y Silas, cantaban himnos a Dios; y los presos los oían." },
            { ref: "Habacuc 3:17-18", text: "Aunque la higuera no florezca... con todo, yo me alegraré en Jehová, y me gozaré en el Dios de mi salvación." },

            { ref: "Salmos 147:1", text: "Alabad a JAH, porque es bueno cantar salmos a nuestro Dios; porque suave y hermosa es la alabanza." },

            { ref: "Salmos 113:3", text: "Desde el nacimiento del sol hasta donde se pone, sea alabado el nombre de Jehová." },
            { ref: "1 Crónicas 16:23-24", text: "Cantad a Jehová, toda la tierra, proclamad de día en día su salvación. Cantad entre las gentes su gloria, y en todos los pueblos sus maravillas." },

            { ref: "Salmos 57:9-10", text: "Te alabaré entre los pueblos, oh Señor; cantaré de ti entre las naciones. Porque grande es hasta los cielos tu misericordia, y hasta las nubes tu verdad." },

        ];

        // Función para mezclar aleatoriamente el arreglo
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        let shuffledVerses = [];
        let currentIndex = 0;
        let slideInterval;
        let progressInterval;
        let progress = 0;

        const root = document.documentElement;
        const container = document.getElementById('verse-container');
        const textElement = document.getElementById('verse-text');
        const refElement = document.getElementById('verse-ref');
        const progressBar = document.getElementById('progress-bar');
        
        const TIME_MS = 30000; // 30 segundos

        function applyRandomTheme() {
            // Seleccionar un tema de color aleatorio de nuestra lista
            const randomTheme = colorThemes[Math.floor(Math.random() * colorThemes.length)];
            
            // Aplicar el tema actualizando las variables CSS globales
            root.style.setProperty('--card-bg', randomTheme.bg);
            root.style.setProperty('--text-color', randomTheme.text);
            root.style.setProperty('--accent-color', randomTheme.accent);
        }

        function updateVerse() {
            // Iniciar efecto de desvanecimiento para ocultar
            container.classList.add('fade-out');

            setTimeout(() => {
                // Reiniciar ciclo de versículos si llegamos al final
                if (currentIndex >= shuffledVerses.length) {
                    shuffledVerses = shuffleArray([...verses]);
                    currentIndex = 0;
                }

                // Obtener nuevo versículo
                const currentVerse = shuffledVerses[currentIndex];
                textElement.innerText = currentVerse.text;
                refElement.innerText = currentVerse.ref;

                // Cambiar el tema de color antes de volver a aparecer
                applyRandomTheme();

                // Volver a aparecer con todo actualizado
                container.classList.remove('fade-out');
                currentIndex++;
            }, 1000); 
        }

        function startDisplay() {
            shuffledVerses = shuffleArray([...verses]);
            applyRandomTheme(); // Aplicar color al arrancar
            updateVerse();
            resetTimers();
        }

        function resetTimers() {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            progress = 0;
            progressBar.style.width = '0%';

            progressInterval = setInterval(() => {
                progress += (100 / (TIME_MS / 1000));
                progressBar.style.width = `${progress}%`;
            }, 1000);

            slideInterval = setInterval(() => {
                progress = 0;
                progressBar.style.width = '0%';
                updateVerse();
            }, TIME_MS);
        }

        // Cambiar manualmente al hacer clic
        document.body.addEventListener('click', () => {
            updateVerse();
            resetTimers();
        });

        window.onload = startDisplay;

    </script>
</body>
</html>
